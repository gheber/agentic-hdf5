name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - release
          - pre-release

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for trusted publishing
      contents: write  # Required for creating tags and releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for tag counting

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get base version from pyproject.toml
        id: base_version
        run: echo "version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")" >> "$GITHUB_OUTPUT"

      - name: Compute release version
        id: version
        run: |
          BASE="${{ steps.base_version.outputs.version }}"
          if [ "${{ inputs.release_type }}" = "pre-release" ]; then
            # Count existing pre-release tags for this base version to auto-increment
            COUNT=$(git tag --list "v${BASE}pre*" | wc -l | tr -d ' ')
            VERSION="${BASE}pre${COUNT}"
          else
            VERSION="${BASE}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Set package version for build
        run: |
          python -c "
          import re
          with open('pyproject.toml', 'r') as f:
              content = f.read()
          content = re.sub(
              r'version = \".*?\"',
              'version = \"${{ steps.version.outputs.version }}\"',
              content,
              count=1
          )
          with open('pyproject.toml', 'w') as f:
              f.write(content)
          "

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create git tag
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          prerelease: ${{ inputs.release_type == 'pre-release' }}
          generate_release_notes: true
          files: dist/*
