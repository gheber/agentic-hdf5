[pytest]
# Suppress deprecation warning from dateutil library (third-party dependency)
#
# This warning is triggered when importing:
#   - sentence_transformers
#   - matplotlib.pyplot
#
# Since this is in third-party code (dateutil/tz/tz.py:37), we suppress it here.
filterwarnings =
    ignore::DeprecationWarning:dateutil.tz.tz

# Exclude agent tests (API-calling) from default runs.
# Run them explicitly with: pytest -m agent
addopts = -m "not agent"
markers =
    agent: tests that call the Anthropic API (slow, requires ANTHROPIC_API_KEY)
